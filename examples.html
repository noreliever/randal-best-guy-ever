<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Example</title>
    <link rel="stylesheet" href="./styles/main.css">
</head>

<body>
    <!-- you can wrap stuff in a div inside div (nesting) -->
    <div class="layout">
        <div class="left">
            <p>left</p>
        </div>


        <div class="middle">
            <p>centre</p>
        </div>


        <div class="right">
            <p>hallo</p>
        </div>
    </div>

</body>

</html>
