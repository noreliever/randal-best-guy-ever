<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hunter</title>
    <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
     <style>
        .img-container{
        position: relative;
        overflow: hidden;
        width: 300px;
        height: 500px;
        border: 2px solid #ccc;
        border-radius: 8px;
        cursor:zoom-in;
        margin-top: 15vh;
    }

    .img-container img{
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.4s ease;
        align-self: center;
    }

    .img-container:hover img{
        transform: scale(1.5);}
    </style>

    <h2>Image Zoom on Hover!!!</h2>

    <div class="img-container">
        <img src="./images/Hunt3r.jpg"
        alt="Cutest picture of Hunter ever">
    </div>
</body>
</html>
